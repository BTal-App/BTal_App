name: Deploy to Firebase Hosting

# Solo dispara en pushes a `main` · los PRs no llegan aquí.
# Combinado con branch protection (item 12-5), garantiza que cualquier
# código que entre en producción ha pasado por CI verde en un PR.
on:
  push:
    branches: [main]

# Encolar deploys · NO cancelamos uno en curso. Si llegan dos pushes
# seguidos, el segundo espera a que el primero termine para no dejar
# producción en estado intermedio.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build · Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Pre-deploy gates · si alguien empuja a main saltándose el PR
      # (posible mientras branch protection no esté activo · ver 12-5),
      # estos checks son la última red de seguridad antes de publicar.
      # Si branch protection está activo, este código ya pasó CI en el
      # PR y es prácticamente redundante (toma 60-90 s extra · vale la
      # pena por la paz mental).
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      # Guardamos contra el bug de "deploy con .env vacío" que ya nos
      # tiró producción una vez. Si falta cualquier secret, abortamos
      # ANTES del build · producción intacta. Sin esto, Vite acepta
      # vars vacías felizmente y publica un bundle que crashea en
      # runtime con `auth/invalid-api-key`.
      - name: Verify required env vars are set
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          missing=0
          for v in VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID; do
            if [ -z "${!v}" ]; then
              echo "::error::Secret $v is empty. Add it at Settings → Secrets and variables → Actions."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            exit 1
          fi
          echo "All required env vars present."

      - name: Build (typecheck + Vite + Workbox SW)
        # Las VITE_FIREBASE_* las embebe Vite en el bundle en tiempo de
        # build. Sin esto, el .env del CI está vacío y la app sale a
        # producción con `auth/invalid-api-key` en runtime. Cada var
        # vive como secret separado en GitHub (Repo → Settings →
        # Secrets and variables → Actions).
        #
        # `VITE_RECAPTCHA_V3_SITE_KEY` se trata como OPCIONAL adrede ·
        # si falta el build pasa (App Check no se inicializa) · esto
        # facilita el rollout: deployamos el código ANTES de tener el
        # site key, comprobamos que no rompe nada, y luego añadimos el
        # secret + redeploy. Si ponemos enforcement en Firebase Console
        # sin haber añadido el secret, todas las requests fallarán 403.
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_RECAPTCHA_V3_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_V3_SITE_KEY }}
        run: npm run build

      # Action oficial de Firebase Hosting · maneja la auth con el
      # service account, sube `dist/` y publica al canal `live`.
      # Documenta el deploy como Check en el commit · si la action
      # devuelve != 0, el workflow falla y producción no se toca.
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BTAL_APP }}
          projectId: btal-app
          channelId: live
