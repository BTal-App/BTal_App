name: CI

# Corre en cada PR contra main y en cada push a main. Bloqueamos el
# merge desde Branch Protection si este workflow falla (configuración
# manual una vez · ver item 12-5 del roadmap).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancelar runs anteriores del mismo ref · si empujas dos commits
# seguidos al mismo PR, solo el último se ejecuta.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22 LTS · current stable. Si el proyecto sube a Node
          # 24 en local algún día, actualizar aquí también.
          node-version: '22'
          # Cache de npm vía package-lock.json · acelera installs en
          # ~20 s vs cold cache.
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` es la forma correcta en CI · respeta el lockfile
        # exactamente y falla si hay drift entre package.json y
        # package-lock.json (mejor pillarlo aquí que en prod).
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        # `test:run` corre Vitest una vez (sin watch) y sale con
        # código != 0 si algún test falla.
        run: npm run test:run

      - name: Build
        # `npm run build` ya incluye `tsc -b` (typecheck completo) +
        # `vite build` (genera dist con Service Worker via VitePWA).
        # Si compilara sin errores aquí, casi seguro que también en
        # producción.
        run: npm run build

  e2e:
    name: E2E · Playwright (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Independiente del job `ci` · corren en paralelo. Si el lint/test/
    # build falla el bloque ci da feedback antes; este verifica que la
    # app arranca y los flujos pre-auth (landing, legal, routing) no
    # han regresionado. Sin secrets de Firebase · los tests no llegan
    # a hacer auth real ni a tocar Firestore.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Cache estaría bien pero el browser pesa ~150 MB · por ahora
        # bajamos cada run. Si las E2E se vuelven más pesadas, mover
        # a `actions/cache` con key basada en `npx playwright --version`.
        run: npx playwright install --with-deps chromium

      - name: Build (sin secrets de Firebase · suficiente para flujos pre-auth)
        # Sin VITE_FIREBASE_* el bundle se genera con strings vacíos.
        # La Landing y las páginas legales no necesitan Firebase activo
        # para renderizar · onAuthStateChanged falla en background pero
        # no rompe el render. Si en el futuro añadimos tests que SÍ
        # requieran Firebase real (guest signup, etc.), tendremos que
        # pasar los secrets aquí también.
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
