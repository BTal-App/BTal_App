    <!-- ════════════════════════════════════════════════════════════════
         SPLASH SCREEN (Instagram/X style)
         Aparece INSTANTÁNEAMENTE antes de que React cargue.
         main.tsx lo elimina con fade-out cuando React monta.
         ════════════════════════════════════════════════════════════════ -->
    <style>
      html,
      body {
        background: #0a0e0c;
        margin: 0;
      }
      #btal-splash {
        position: fixed;
        inset: 0;
        background: #0a0e0c;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.35s ease-out;
      }
      #btal-splash img {
        /* BT lima transparente · tamaño moderado tipo Instagram/X */
        width: clamp(110px, 32vw, 170px);
        height: auto;
        animation: btal-splash-pulse 2s ease-in-out infinite;
        will-change: transform;
      }
      #btal-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      @keyframes btal-splash-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(0.96);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #btal-splash img {
          animation: none;
        }
      }
      /* En modo PWA standalone (instalada en home screen iOS/Android), iOS ya
         muestra su splash nativo (apple-touch-startup-image). Ocultamos el
         nuestro para evitar el efecto "dos splashes seguidos". El HTML splash
         queda solo para quien abra en navegador (sin instalar). */
      @media (display-mode: standalone) {
        #btal-splash {
          display: none !important;
        }
      }
    </style>
